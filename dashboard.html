<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="admin-dashboard.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a84ff">

</head>
<body onload="checkAdmin(); initDashboard();">

<div class="admin">

<div class="sidebar">
<h2>Admin</h2>

<button id="installAdminBtn" style="display:none;margin:10px 0;padding:8px;border:none;background:#0a84ff;color:#fff;border-radius:6px;">
📲 Install Admin App
</button>

<a href="dashboard.html">Dashboard</a>
<a href="users.html">Users</a>
<a href="bookings.html">Bookings</a>
<a href="guides.html">Guides</a>
<a href="guides-list.html">Guides list</a>
<a href="admin-notification.html">🔔 Send Notification</a>
<a onclick="logoutAdmin()">Logout</a>
</div>

<div class="content">
<h1>Dashboard</h1>

<div class="card">Total Users: <span id="totalUsers">0</span></div>
<div class="card">Total Bookings: <span id="totalBookings">0</span></div>
<div class="card">Total Profit: ₹ <span id="totalProfit">0</span></div>

<div class="card clickable" onclick="window.location.href='admin-notification.html'">
  🔔 Send Notification to Users
</div>

<div class="card clickable" onclick="filterBookings('assigned')">
Accepted Bookings: <span id="acceptedCount">0</span>
</div>

<div class="card clickable" onclick="filterBookings('waiting')">
Waiting Bookings: <span id="waitingCount">0</span>
</div>

<div class="card clickable" onclick="filterBookings('pending')">
Pending Bookings: <span id="pendingCount">0</span>
</div>

<div class="card clickable" onclick="filterBookings('rejected')">
Cancelled Bookings: <span id="cancelCount">0</span>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function initDashboard(){

const { data:users } = await supabaseClient
.from("users")
.select("*")

totalUsers.innerText = users?.length || 0

const { data:bookings } = await supabaseClient
.from("bookings")
.select("*")

totalBookings.innerText = bookings?.length || 0

let profit = 0
let accepted = 0
let waiting = 0
let pending = 0
let cancel = 0

bookings.forEach(b=>{

let total = Number(b.total_price || 0)

if(b.status === "assigned"){
profit += total
accepted++
}

if(b.status === "waiting") waiting++
if(b.status === "pending") pending++
if(b.status === "rejected") cancel++

})

totalProfit.innerText = profit
acceptedCount.innerText = accepted
waitingCount.innerText = waiting
pendingCount.innerText = pending
cancelCount.innerText = cancel
}

function filterBookings(status){
window.location.href = "bookings.html?status="+status
}

function logoutAdmin(){
localStorage.removeItem("admin")
window.location.href="login.html"
}
</script>

<script>
/* service worker */
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

/* install app */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById("installAdminBtn").style.display = "block";
});

document.getElementById("installAdminBtn").addEventListener("click", async () => {
if (!deferredPrompt) return;
deferredPrompt.prompt();
});
</script>

  <script>
function checkAdmin(){
const admin = localStorage.getItem("admin")
if(!admin){
window.location.href = "login.html"
}
}
  </script>
</body>
</html>
